name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify tag matches manifest versionName
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_NAME=$(grep -oP 'android:versionName="\K[^"]+' AndroidManifest.xml)
          TAG="${GITHUB_REF_NAME#v}"
          echo "Tag: $GITHUB_REF_NAME  →  $TAG"
          echo "Manifest versionName: $VERSION_NAME"
          if [ "$TAG" != "$VERSION_NAME" ]; then
            echo "❌ FAIL: tag v$TAG does not match AndroidManifest versionName $VERSION_NAME."
            echo "Bump android:versionName (and versionCode) before tagging, or tag v$VERSION_NAME."
            exit 1
          fi
          echo "✅ PASS: tag matches manifest"

      - name: Install Android build tools
        run: bash scripts/install-android-tools.sh

      - name: Security scan
        run: bash scripts/security-scan.sh

      - name: Build APK
        run: bash scripts/build-apk.sh

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.SIGNING_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Signing with the stable keystore from secrets (releases will update over each other)."
            echo "$KEYSTORE_B64" | base64 -d > build/key.jks
            STOREPASS="$KEYSTORE_PASS"
            KEYPASS="${KEY_PASS:-$KEYSTORE_PASS}"
            ALIAS="${KEY_ALIAS:-volumesteps}"
          else
            echo "::warning::No SIGNING_KEYSTORE_B64 secret set — generating a throwaway key. This APK will NOT install as an update over a previous release (signature mismatch); users would have to uninstall first. Add the SIGNING_KEYSTORE_B64 secret for stable signing."
            keytool -genkeypair \
              -keystore build/key.jks \
              -alias volumesteps \
              -keyalg RSA -keysize 2048 \
              -validity 36500 \
              -storepass android -keypass android \
              -dname "CN=VolumeSteps Developer,O=VolumeSteps,C=IL" \
              2>/dev/null
            STOREPASS=android; KEYPASS=android; ALIAS=volumesteps
          fi
          apksigner sign \
            --ks build/key.jks --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STOREPASS" --key-pass "pass:$KEYPASS" \
            --out build/VolumeSteps.apk build/app-aligned.apk

      - name: Verify APK
        run: |
          apksigner verify build/VolumeSteps.apk
          echo ""
          echo "=== Final APK permissions ==="
          aapt d permissions build/VolumeSteps.apk
          echo ""
          ls -lh build/VolumeSteps.apk

      - name: Generate SHA-256 checksum
        run: |
          sha256sum build/VolumeSteps.apk | tee build/VolumeSteps.apk.sha256

      - name: VirusTotal scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "⚠️ VT_API_KEY secret not set, skipping VirusTotal scan"
            echo "VT_RESULT=Skipped (no API key)" >> $GITHUB_ENV
            exit 0
          fi
          echo "Uploading APK to VirusTotal..."
          RESPONSE=$(curl -s --request POST \
            --url "https://www.virustotal.com/api/v3/files" \
            --header "x-apikey: $VT_API_KEY" \
            --form "file=@build/VolumeSteps.apk")

          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || echo "")

          if [ -z "$ANALYSIS_ID" ]; then
            echo "⚠️ Upload failed, skipping VirusTotal"
            echo "Response: $RESPONSE"
            echo "VT_RESULT=Upload failed" >> $GITHUB_ENV
            exit 0
          fi

          echo "Analysis ID: $ANALYSIS_ID"
          echo "Waiting for scan to complete..."
          # Poll for up to ~3 minutes instead of a fixed sleep.
          STATUS=""
          for i in $(seq 1 18); do
            sleep 10
            RESULT=$(curl -s \
              --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
              --header "x-apikey: $VT_API_KEY")
            STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['status'])" 2>/dev/null || echo "")
            echo "  attempt $i: status=$STATUS"
            [ "$STATUS" = "completed" ] && break
          done

          MALICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['malicious'])" 2>/dev/null || echo "?")
          UNDETECTED=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['undetected'])" 2>/dev/null || echo "?")

          SHA256=$(cut -d' ' -f1 build/VolumeSteps.apk.sha256)
          VT_URL="https://www.virustotal.com/gui/file/$SHA256"

          echo ""
          echo "=== VirusTotal Results ==="
          echo "Malicious: $MALICIOUS | Clean: $UNDETECTED"
          echo "Full report: $VT_URL"

          echo "VT_RESULT=Malicious: $MALICIOUS | Clean: $UNDETECTED — [Full Report]($VT_URL)" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolumeSteps-${{ github.ref_name }}
          path: |
            build/VolumeSteps.apk
            build/VolumeSteps.apk.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VolumeSteps ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## VolumeSteps ${{ github.ref_name }}

            ### 🔒 Security verification
            This APK was **built automatically from source** by GitHub Actions — not uploaded from anyone's computer.
            Click the **Actions** tab → this run to see the full public build log.

            | Check | Result |
            |---|---|
            | No INTERNET permission | ✅ Passed |
            | No network code in source | ✅ Passed |
            | No data collection / tracking | ✅ Passed |
            | Permissions count (max 5) | ✅ Passed |
            | VirusTotal | ${{ env.VT_RESULT }} |

            ### 📦 Install
            Download `VolumeSteps.apk` below, enable "Install from unknown sources", install.

            ### 🔍 Verify file integrity
            ```
            sha256sum VolumeSteps.apk
            ```
            Compare with `VolumeSteps.apk.sha256`.
          files: |
            build/VolumeSteps.apk
            build/VolumeSteps.apk.sha256
